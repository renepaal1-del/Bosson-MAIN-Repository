[package]
name = "zlib"
version = "1.3.1"
description = "Lossless data-compression library"
homepage = "https://www.zlib.net/"
license = "Zlib"
category = "sys-libs"

[source]
url = "https://www.zlib.net/zlib-1.3.1.tar.gz"
sha256 = "9a93b2b7dfdac77ceba5a558a580e74667dd6fede4584b17e422d0090749ea1f"

[build]
configure = "./configure --prefix=${PREFIX}"
make = "make -j${JOBS}"
install = "make install DESTDIR=${DESTDIR}"

[dependencies]
runtime = []
buildtime = ["gcc", "make"]

[spins]
available = []
default = []
