[package]
name = "pkg-config"
version = "0.29.2"
description = "Helper for retrieving library information"
homepage = "https://www.freedesktop.org/wiki/Software/pkg-config/"
license = "GPL-2.0-or-later"
category = "sys-devel"

[source]
url = "https://pkgconfig.freedesktop.org/releases/pkg-config-0.29.2.tar.gz"
sha256 = "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
# ^^^ REPLACE: sha256sum pkg-config-0.29.2.tar.gz

[build]
configure = "./configure --prefix=${PREFIX} --with-internal-glib"
make = "make -j${JOBS}"
install = "make install DESTDIR=${DESTDIR}"

[dependencies]
runtime = ["glibc"]
buildtime = ["glibc", "make"]

[spins]
available = []
default = []
